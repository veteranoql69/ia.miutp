version: "3.7"

services:
  miutp-app:
    # Imagen compilada desde GitHub Actions y subida a tu GHCR
    image: ghcr.io/veteranoql69/ia.miutp:latest
    networks:
      - DesaNet

    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXT_PUBLIC_LANGFUSE_PUBLIC_KEY=${NEXT_PUBLIC_LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - STIRLING_PDF_API_URL=${STIRLING_PDF_API_URL}
      - STIRLING_PDF_API_KEY=${STIRLING_PDF_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
          
      labels:
        - traefik.enable=true
        - traefik.http.routers.miutp-app.rule=Host(`miutp.sditecnologia.cl`)
        - traefik.http.routers.miutp-app.entrypoints=websecure
        - traefik.http.routers.miutp-app.priority=1
        - traefik.http.routers.miutp-app.tls.certresolver=letsencryptresolver
        - traefik.http.routers.miutp-app.service=miutp-app
        - traefik.http.services.miutp-app.loadbalancer.server.port=3000
        - traefik.http.services.miutp-app.loadbalancer.passHostHeader=1

networks:
  DesaNet:
    external: true
    name: DesaNet
